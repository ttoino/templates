_min_copier_version: "9.0.0"

_subdirectory: template

name:
    type: str
    help: Project name (kebab-case, used in package.json and wrangler.jsonc)
    default: "{{ _copier_conf.dst_path.name }}"
    validator: >-
        {% if not (name | regex_search('^[a-z][a-z0-9\-]+$')) %}
        name must start with a letter, followed by one or more letters, digits, or dashes, all lowercase.
        {% endif %}

description:
    type: str
    help: Short description of the project

type:
    type: str
    help: What type of project is this?
    choices:
        Cloudflare Worker (Hono): worker
        SvelteKit app: sveltekit
        Svelte(Kit) library: library

tailwind:
    type: bool
    help: Include Tailwind CSS?
    default: "{{ type != 'worker' }}"
    when: "{{ type != 'worker' }}"

svelte_m3c:
    type: bool
    help: Include Svelte M3C?
    default: false
    when: "{{ tailwind }}"

tests:
    type: bool
    help: Include Vitest?
    default: true

browser_tests:
    type: bool
    help: Include Playwright?
    default: false
    when: "{{ type != 'worker' }}"

# Computed values
_svelte: "{{ type in ['sveltekit', 'library'] }}"

_message_after_copy: |
    Project "{{ name }}" created successfully!

    Next steps:
    1. cd {{ _copier_conf.dst_path }}
    2. direnv allow  # if using direnv, or: nix develop
    3. pnpm install
    4. pnpm dev
